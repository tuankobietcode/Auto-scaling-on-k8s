# k8s/rbac.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: predictor-sa
  namespace: carserv

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: predictor-role
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: predictor-binding
subjects:
  - kind: ServiceAccount
    name: predictor-sa
    namespace: carserv
roleRef:
  kind: ClusterRole
  name: predictor-role
  apiGroup: rbac.authorization.k8s.io
