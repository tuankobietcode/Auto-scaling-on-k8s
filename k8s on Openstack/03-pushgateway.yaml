# Pushgateway — nơi predictor đẩy metric tạm thời, Prometheus scrape lại mỗi 30s.
# Expose NodePort 30060 (giữ cổng cũ cho truy cập/ debug ngoài cluster).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pushgateway
  namespace: monitoring
  labels:
    app: pushgateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pushgateway
  template:
    metadata:
      labels:
        app: pushgateway
    spec:
      containers:
        - name: pushgateway
          image: prom/pushgateway:v1.9.0
          ports:
            - containerPort: 9091
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits:   { cpu: 100m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: pushgateway
  namespace: monitoring
  labels:
    app: pushgateway
spec:
  type: NodePort
  selector:
    app: pushgateway
  ports:
    - name: http
      port: 9091
      targetPort: 9091
      nodePort: 30060
